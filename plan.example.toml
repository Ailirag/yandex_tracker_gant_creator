# Пример конфига запуска планировщика.
# Запуск:  uv run planner plan --config plan.example.toml
# Любой флаг в командной строке ПЕРЕОПРЕДЕЛЯЕТ значение отсюда.
# Скопируйте под свой сценарий (например, plan_finance.toml) и правьте.

# --- Отбор задач ---
# Запрос к Трекеру (язык запросов). По умолчанию — вся незакрытая очередь ONE.
query = '"Queue": "ONE" "Resolution": unresolved()'
# Дата начала раскладки (YYYY-MM-DD). Пусто/отсутствует = сегодня.
# start = "2026-07-16"

# Исключения по статус-модели (всё опционально):
exclude_in_progress = false          # убрать задачи «в работе»
exclude_tail        = false          # убрать «на стадии завершения» (тест/ревью/релиз)
exclude_status      = ["Пауза", "Отложено"]   # произвольные статусы (список или строка через запятую)
keep_empty_teams    = false          # НЕ исключать команды без ресурса в выгрузке

# --- Ёмкость и резерв ---
capacity      = "file"               # mock | file | onec
capacity_file = "../source/ресурс по командам по дням.xlsx"   # для capacity=file
reserve       = 0.25                 # резерв под влёты (0..1 или проценты: 25). 0 = без резерва
# onec_url    = "http://host/base/hs/planner"   # для capacity=onec

# --- Спринты (для сетки на Ганте) ---
sprint_weeks  = 2
sprint_anchor = "2026-07-21"         # дата начала любого спринта

# --- Сравнение планов ---
no_baseline   = false                # true = не сравнивать с прошлым планом
# baseline    = "out/plan_20260716_0043.json"   # явный базовый план
# what_if     = "ONE-2515=1"          # виртуальные важности (план не станет базовым)
